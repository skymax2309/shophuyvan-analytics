<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>ShopHuyVan Auto Report</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    width: 360px;
    background: #f8fafc;
    color: #1e293b;
    font-size: 13px;
  }
  .header {
    background: linear-gradient(135deg, #4f46e5, #7c3aed);
    color: white;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header .logo { font-size: 20px; }
  .header .title { font-size: 14px; font-weight: 700; }
  .header .sub   { font-size: 11px; opacity: 0.8; }

  .section {
    background: white;
    margin: 10px;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  .section-title {
    font-size: 11px;
    font-weight: 700;
    color: #6b7280;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 10px 14px 6px;
    border-bottom: 1px solid #f3f4f6;
  }

  /* Date range */
  .date-row {
    display: flex;
    gap: 8px;
    padding: 10px 14px;
    align-items: center;
  }
  .date-row label { font-size: 12px; color: #6b7280; white-space: nowrap; }
  .date-row input[type=date] {
    flex: 1;
    border: 1px solid #e5e7eb;
    border-radius: 6px;
    padding: 5px 8px;
    font-size: 12px;
    outline: none;
  }
  .date-row input[type=date]:focus { border-color: #6366f1; }

  /* Platform buttons */
  .platform-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    padding: 10px 14px;
  }
  .plt-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 10px 6px;
    border-radius: 8px;
    border: 2px solid #e5e7eb;
    background: white;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 11px;
    font-weight: 600;
    color: #374151;
  }
  .plt-btn:hover    { border-color: #6366f1; background: #f0f0ff; }
  .plt-btn.active   { border-color: #4f46e5; background: #eef2ff; color: #4f46e5; }
  .plt-btn .icon    { font-size: 22px; }
  .plt-btn.tiktok.active  { border-color: #111; background: #f9f9f9; color: #111; }
  .plt-btn.shopee.active  { border-color: #ee4d2d; background: #fff5f4; color: #ee4d2d; }
  .plt-btn.lazada.active  { border-color: #0f146d; background: #f0f0ff; color: #0f146d; }

  /* Run button */
  .run-btn {
    display: block;
    width: calc(100% - 28px);
    margin: 0 14px 14px;
    padding: 11px;
    background: linear-gradient(135deg, #4f46e5, #7c3aed);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .run-btn:hover    { opacity: 0.9; }
  .run-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Log */
  .log-area {
    padding: 8px 14px 12px;
    max-height: 120px;
    overflow-y: auto;
  }
  .log-item {
    display: flex;
    align-items: flex-start;
    gap: 6px;
    padding: 4px 0;
    border-bottom: 1px solid #f9fafb;
    font-size: 11px;
    line-height: 1.4;
  }
  .log-item .badge {
    background: #e0e7ff;
    color: #4338ca;
    border-radius: 4px;
    padding: 1px 5px;
    font-size: 10px;
    font-weight: 700;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .log-item.error .badge { background: #fee2e2; color: #dc2626; }
  .log-item.success .badge { background: #dcfce7; color: #16a34a; }
  .log-item .msg { color: #374151; }

  /* Settings */
  .settings-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 14px;
    border-bottom: 1px solid #f3f4f6;
  }
  .settings-row label { color: #374151; }
  .toggle {
    position: relative;
    width: 36px;
    height: 20px;
  }
  .toggle input { display: none; }
  .toggle-slider {
    position: absolute;
    inset: 0;
    background: #d1d5db;
    border-radius: 20px;
    cursor: pointer;
    transition: 0.2s;
  }
  .toggle-slider:before {
    content: "";
    position: absolute;
    width: 16px; height: 16px;
    left: 2px; top: 2px;
    background: white;
    border-radius: 50%;
    transition: 0.2s;
  }
  .toggle input:checked + .toggle-slider { background: #4f46e5; }
  .toggle input:checked + .toggle-slider:before { transform: translateX(16px); }

  .schedule-row {
    padding: 8px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .schedule-row label { color: #6b7280; }
  .schedule-row select, .schedule-row input {
    border: 1px solid #e5e7eb;
    border-radius: 6px;
    padding: 4px 8px;
    font-size: 12px;
    outline: none;
  }

  .footer {
    padding: 8px 14px;
    font-size: 10px;
    color: #9ca3af;
    text-align: center;
    border-top: 1px solid #f3f4f6;
  }
  .footer a { color: #6366f1; text-decoration: none; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">🛒</div>
  <div>
    <div class="title">ShopHuyVan Auto Report</div>
    <div class="sub">Tự động tải báo cáo từ các sàn TMĐT</div>
  </div>
</div>

<!-- Chọn khoảng ngày -->
<div class="section">
  <div class="section-title">📅 Khoảng thời gian</div>
  <div class="date-row">
    <label>Từ</label>
    <input type="date" id="dateFrom">
    <label>Đến</label>
    <input type="date" id="dateTo">
  </div>
</div>

<!-- Chọn sàn -->
<div class="section">
  <div class="section-title">🏪 Chọn sàn tải báo cáo</div>
  <div class="platform-grid">
    <button class="plt-btn tiktok active" data-platform="tiktok">
      <span class="icon">🎵</span>TikTok
    </button>
    <button class="plt-btn shopee active" data-platform="shopee">
      <span class="icon">🛍️</span>Shopee
    </button>
    <button class="plt-btn lazada" data-platform="lazada">
      <span class="icon">📦</span>Lazada
    </button>
  </div>
</div>

<!-- Nút chạy -->
<button class="run-btn" id="runBtn">
  🚀 Bắt đầu tải tự động
</button>

<!-- Log trạng thái -->
<div class="section">
  <div class="section-title">📋 Trạng thái</div>
  <div class="log-area" id="logArea">
    <div class="log-item">
      <span class="badge">INFO</span>
      <span class="msg">Chọn sàn và khoảng ngày, nhấn Bắt đầu.</span>
    </div>
  </div>
</div>

<!-- Cài đặt -->
<div class="section">
  <div class="section-title">⚙️ Cài đặt</div>
  <div class="settings-row">
    <label>🔄 Auto-intercept download</label>
    <label class="toggle">
      <input type="checkbox" id="autoIntercept" id-setting="autoIntercept">
      <span class="toggle-slider"></span>
    </label>
  </div>
  <div class="settings-row">
    <label>🗓️ Tự động theo lịch</label>
    <label class="toggle">
      <input type="checkbox" id="scheduleEnabled" id-setting="scheduleEnabled">
      <span class="toggle-slider"></span>
    </label>
  </div>
  <div class="schedule-row" id="scheduleOptions" style="display:none">
    <label>Ngày chạy (ngày/tháng):</label>
    <input type="number" id="scheduleDay" min="1" max="31" value="3" style="width:50px"
      id-setting-day>
    <label>hàng tháng</label>
  </div>
</div>

<div class="footer">
  Upload đến: <a href="https://huyvan-worker-api.nghiemchihuy.workers.dev" target="_blank">worker-api</a>
</div>

<script src="popup.js"></script>
</body>
</html>
