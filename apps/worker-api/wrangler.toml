name = "huyvan-worker-api"
main = "src/index.js"
compatibility_date = "2024-03-12"
compatibility_flags = ["nodejs_compat"]

# Worker settings
workers_dev = true

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "huyvan-analytics-db"
database_id = "60d0148f-9133-44a8-ad2f-da4d750995f6"

# R2 Storage
[[r2_buckets]]
binding = "STORAGE"
bucket_name = "huyvan-storage"

[[r2_buckets]]
binding = "R2"
bucket_name = "shophuyvan-reports"

# Optional environment variables
[vars]
APP_NAME = "HuyVan Analytics"
VERSION = "1.0"
SHOPEE_DISCOUNT_LIVE_WRITE_ENABLED = "true"
SHOPEE_LIVE_WRITE_ENABLED = "true"
SHOPEE_ADS_LIVE_WRITE_ENABLED = "true"
LAZADA_PRICE_LIVE_WRITE_ENABLED = "true"
CHAT_VAPID_PUBLIC_KEY = "BAYizvHyPSJqGaZl7ugbE44195Tp1i2kZqrpa34hHOiCNBL97msbSoDvT4Uo2PwQ6hd0E4EVkFxgQLbilYVCHR8"
CHAT_VAPID_SUBJECT = "https://shophuyvan-analytics.nghiemchihuy.workers.dev"

# Lên lịch tự động chạy mỗi 24h (0h00 mỗi ngày UTC)
[triggers]
crons = ["0 0 * * *", "*/5 * * * *", "*/15 * * * *"]
