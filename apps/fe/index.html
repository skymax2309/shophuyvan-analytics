<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<title>Import Orders</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script type="module" src="./js/parser.js"></script>

<style>

body{
 font-family:Arial;
 padding:40px;
 background:#f5f5f5;
}

.box{
 background:white;
 padding:20px;
 border-radius:10px;
 max-width:500px;
}

button{
 padding:10px 20px;
 margin-top:10px;
}

#log{
 margin-top:20px;
 font-size:14px;
}

</style>

</head>

<body>

<div class="box">

<h2>Upload File Bán Hàng</h2>

<input type="file" id="file">

<br>

<button onclick="importFile()">Import Excel</button>

<div id="log"></div>

</div>

<script>

const API="https://huyvan-worker-api.yourname.workers.dev"

async function importFile(){

 const file=document.getElementById("file").files[0]

 if(!file){
  alert("Chọn file trước")
  return
 }

 document.getElementById("log").innerHTML="Đang đọc file..."

 const data=await file.arrayBuffer()

 const workbook=XLSX.read(data)

 const sheet=workbook.Sheets[workbook.SheetNames[0]]

 const rows=XLSX.utils.sheet_to_json(sheet)

 const orders = []

rows.forEach(r=>{

 const order = normalizeOrder(r)

 if(order) orders.push(order)

})

 document.getElementById("log").innerHTML=
 "Đã parse "+orders.length+" dòng dữ liệu"

 await fetch(API+"/api/import-orders",{
  method:"POST",
  headers:{
   "Content-Type":"application/json"
  },
  body:JSON.stringify(orders)
 })

 document.getElementById("log").innerHTML+="<br>Upload thành công"

}

</script>

</body>
</html>
