<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Import đơn hàng</title>
  <link rel="stylesheet" href="css/import-orders.css">
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>
<body>
  <main class="import-shell">
    <section class="import-panel">
      <header class="import-header">
        <h1>Upload file bán hàng</h1>
        <nav class="import-links" aria-label="Điều hướng nhanh">
          <a href="pages/profit-dashboard.html">Dashboard</a>
          <a href="pages/cost-settings.html">Cài đặt chi phí</a>
          <a href="pages/admin-products.html">Sản phẩm</a>
        </nav>
      </header>

      <label class="file-box" for="file">
        <span>Chọn file Excel đơn hàng</span>
        <input type="file" id="file" accept=".xlsx">
      </label>

      <button id="btnImport" class="primary-button" type="button">Import Excel</button>
      <div id="log" class="import-log" aria-live="polite"></div>
    </section>
  </main>

  <script type="module" src="js/import-orders.js"></script>
</body>
</html>
