<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Upload Báo Cáo Sàn</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js"
</script>
<link rel="stylesheet" href="../css/report-upload.css">
</head>
<body>

<div class="topbar">
  <a href="profit-dashboard.html">← Dashboard</a>
  <span>📁 Upload Báo Cáo Sàn</span>
</div>

<div class="container">

  <!-- Upload form -->
  <div class="card">
    <div class="card-title">📤 Upload Báo Cáo Mới</div>

    <div class="grid3">
      <div class="field">
        <label>Sàn</label>
        <select id="selPlatform">
          <option value="shopee">Shopee</option>
          <option value="tiktok">TikTok</option>
          <option value="lazada">Lazada</option>
        </select>
      </div>
      <div class="field">
        <label>Loại báo cáo</label>
        <select id="selType">
          <option value="income">Doanh Thu</option>
          <option value="expense">Chi Phí</option>
          <option value="orders">Đơn Hàng</option>
          <option value="phi-dau-thau">Quảng Cáo</option>
        </select>
      </div>
      <div class="field">
        <label>Shop</label>
        <div style="display:flex;gap:6px">
          <select id="inpShop"
          style="flex:1;border:1.5px solid #e0e0e0;border-radius:8px;padding:9px 12px;font-size:14px;outline:none">
          <option value="">-- Đang tải shop... --</option>
         </select>
        </div>
      </div>
    </div>

    <div class="upload-zone" id="dropzone" onclick="document.getElementById('fileInput').click()">
      <input type="file" id="fileInput" accept=".pdf,.xlsx,.csv" multiple>
      <div style="font-size:32px;margin-bottom:8px">📄</div>
      <div style="font-weight:600;margin-bottom:4px">Kéo thả hoặc nhấn để chọn file</div>
      <div style="font-size:12px;color:#888">Hỗ trợ: PDF (Shopee, Lazada), Excel/CSV (TikTok)</div>
    </div>

    <div id="fileList"></div>

    <button class="btn btn-primary" id="btnUpload" onclick="uploadAll()" style="margin-top:12px">
      ⬆️ Upload & Parse
    </button>

    <div class="log" id="uploadLog"></div>
  </div>

  <!-- Lịch sử upload -->
  <div class="card">
<div class="card-title" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
      <span>📋 Báo Cáo Đã Upload</span>
      <div style="display:flex;gap:8px">
        <select id="filterPlatform" onchange="loadHistory()" style="border:1.5px solid #e0e0e0;border-radius:7px;padding:6px 10px;font-size:13px;outline:none">
          <option value="">Tất cả sàn</option>
          <option value="shopee">Shopee</option>
          <option value="tiktok">TikTok</option>
          <option value="lazada">Lazada</option>
        </select>
        <select id="filterMonth" onchange="loadHistory()" style="border:1.5px solid #e0e0e0;border-radius:7px;padding:6px 10px;font-size:13px;outline:none">
          <option value="">Tất cả tháng</option>
        </select>
      </div>
    </div>

    <div id="historyList">
      <div style="text-align:center;color:#aaa;padding:30px">Đang tải...</div>
    </div>
  </div>

</div>

<script src="../js/report-upload.js"></script>

</body>
</html>
