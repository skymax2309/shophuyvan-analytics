<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Upload Báo Cáo Sàn</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js"
</script>
<link rel="stylesheet" href="../css/report-upload.css">
</head>
<body>

<div class="topbar">
  <a href="profit-dashboard.html">← Dashboard</a>
  <span>📁 Upload Báo Cáo Sàn</span>
</div>

<div class="container">

  <!-- Upload form -->
  <div class="card">
    <div class="card-title">📤 Upload Báo Cáo Mới</div>

    <div class="grid3">
      <div class="field">
        <label>Sàn</label>
        <select id="selPlatform">
          <option value="shopee">Shopee</option>
          <option value="tiktok">TikTok</option>
          <option value="lazada">Lazada</option>
        </select>
      </div>
      <div class="field">
        <label>Loại báo cáo</label>
        <select id="selType">
          <option value="income">Doanh Thu</option>
          <option value="expense">Chi Phí</option>
          <option value="orders">Đơn Hàng</option>
          <option value="phi-dau-thau">Quảng Cáo</option>
        </select>
      </div>
      <div class="field">
        <label>Shop</label>
        <div style="display:flex;gap:6px">
          <select id="inpShop"
          style="flex:1;border:1.5px solid #e0e0e0;border-radius:8px;padding:9px 12px;font-size:14px;outline:none">
          <option value="">-- Đang tải shop... --</option>
         </select>
        </div>
      </div>
    </div>

    <div class="upload-zone" id="dropzone" onclick="document.getElementById('fileInput').click()">
      <input type="file" id="fileInput" accept=".pdf,.xlsx,.csv" multiple>
      <div style="font-size:32px;margin-bottom:8px">📄</div>
      <div style="font-weight:600;margin-bottom:4px">Kéo thả hoặc nhấn để chọn file</div>
      <div style="font-size:12px;color:#888">Hỗ trợ: PDF (Shopee, Lazada), Excel/CSV (TikTok)</div>
    </div>

    <div id="fileList"></div>

    <button class="btn btn-primary" id="btnUpload" onclick="uploadAll()" style="margin-top:12px">
      ⬆️ Upload & Parse
    </button>

    <div class="log" id="uploadLog"></div>
  </div>

  <div class="card" style="border-top: 4px solid #ff9800;">
    <div class="card-title">🤖 Ra Lệnh Cho Bot (Automation)</div>

    <!-- Hàng 1: Sàn + Tháng + Năm + Hẹn giờ -->
    <div class="grid3">
      <div class="field">
        <label>🏪 Sàn</label>
        <select id="botPlatform" onchange="onBotPlatformChange()" style="width:100%;border:1.5px solid #e0e0e0;border-radius:8px;padding:9px 12px;">
          <option value="shopee">Shopee</option>
          <option value="lazada">Lazada</option>
          <option value="tiktok">TikTok</option>
        </select>
      </div>
      <div class="field">
        <label>Từ tháng → Đến tháng</label>
        <div style="display:flex; gap:5px;">
          <select id="botMonthStart" style="flex:1; border:1.5px solid #e0e0e0; border-radius:8px; padding:9px 5px;">
            <script>for(let i=1; i<=12; i++) document.write(`<option value="${i}">T${i}</option>`)</script>
          </select>
          <select id="botMonthEnd" style="flex:1; border:1.5px solid #e0e0e0; border-radius:8px; padding:9px 5px;">
            <script>for(let i=1; i<=12; i++) document.write(`<option value="${i}">T${i}</option>`)</script>
          </select>
        </div>
      </div>
      <div class="field">
        <label>⏰ Hẹn giờ chạy (Để trống nếu chạy ngay)</label>
        <input type="datetime-local" id="botSchedule" style="width:100%;border:1.5px solid #e0e0e0;border-radius:8px;padding:8px 12px;">
      </div>
      <div class="field">
        <label>Năm</label>
        <select id="botYear" style="width:100%;border:1.5px solid #e0e0e0;border-radius:8px;padding:9px 12px;">
          <option value="2025">2025</option>
          <option value="2026" selected>2026</option>
        </select>
      </div>
      <div class="field">
        <label>Loại báo cáo cần tải</label>
        <select id="botTaskType" style="width:100%;border:1.5px solid #e0e0e0;border-radius:8px;padding:9px 12px;">
          <option value="all">-- Tất cả --</option>
          <option value="doanh_thu">Doanh Thu</option>
          <option value="hoa_don">Quảng Cáo & Phí</option>
          <option value="don_hang">Đơn Hàng</option>
        </select>
      </div>
    </div>

    <!-- Hàng 2: Chọn nhiều shop bằng checkbox -->
    <div class="field" style="margin-top:12px;">
      <label>🏬 Chọn Shop (có thể chọn nhiều)</label>
      <div id="botShopCheckboxes" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;padding:10px;background:#f9f9f9;border-radius:8px;border:1.5px solid #e0e0e0;min-height:44px;">
        <span style="color:#aaa;font-size:13px">Đang tải shop...</span>
      </div>
      <div style="margin-top:6px;display:flex;gap:8px">
        <button onclick="selectAllShops()" style="font-size:12px;padding:4px 10px;border:1px solid #e0e0e0;border-radius:6px;cursor:pointer;background:white">✅ Chọn tất cả</button>
        <button onclick="clearAllShops()" style="font-size:12px;padding:4px 10px;border:1px solid #e0e0e0;border-radius:6px;cursor:pointer;background:white">✕ Bỏ chọn</button>
      </div>
    </div>

    <div style="margin-top: 15px; display: flex; gap: 10px;">
      <button class="btn btn-primary" id="btnCreateJob" onclick="createAutomationJob()" style="background: #ff9800; border:none; flex: 1;">
        🚀 Gửi Lệnh Cho Bot Chạy
      </button>
    </div>
    <div id="botStatusLog" style="margin-top:10px; font-size:13px; color: #666;"></div>
  </div>

  <!-- Lịch sử upload -->
  <div class="card">
<div class="card-title" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
      <span>📋 Báo Cáo Đã Upload</span>
      <div style="display:flex;gap:8px">
        <select id="filterPlatform" onchange="onFilterPlatformChange()" style="border:1.5px solid #e0e0e0;border-radius:7px;padding:6px 10px;font-size:13px;outline:none">
          <option value="">Tất cả sàn</option>
          <option value="shopee">Shopee</option>
          <option value="tiktok">TikTok</option>
          <option value="lazada">Lazada</option>
        </select>
        <select id="filterShop" onchange="loadHistory()" style="border:1.5px solid #e0e0e0;border-radius:7px;padding:6px 10px;font-size:13px;outline:none">
          <option value="">Tất cả shop</option>
        </select>
        <select id="filterMonth" onchange="loadHistory()" style="border:1.5px solid #e0e0e0;border-radius:7px;padding:6px 10px;font-size:13px;outline:none">
          <option value="">Tất cả tháng</option>
        </select>
      </div>
    </div>

    <div id="historyList">
      <div style="text-align:center;color:#aaa;padding:30px">Đang tải...</div>
    </div>
  </div>

<div class="card">
    <div class="card-title" style="display:flex; justify-content:space-between;">
      <span>📊 Trạng Thái Bot (Live)</span>
      <button onclick="loadJobProgress()" style="font-size:12px; cursor:pointer;">🔄 Làm mới</button>
    </div>
    <div id="jobProgressList">
      <div style="text-align:center; padding:20px; color:#aaa;">Đang tải trạng thái bot...</div>
    </div>
  </div>
  
</div>

<script src="../js/report-bot.js"></script>
<script src="../js/report-history.js"></script>
<script src="../js/report-upload.js"></script>


</body>
</html>
