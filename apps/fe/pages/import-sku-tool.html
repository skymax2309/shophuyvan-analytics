<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Import SKU từ Shopee → Analytics</title>
<link rel="stylesheet" href="../css/features/import-sku-tool/import-sku-tool-inline-1.css?v=fe-split-20260514">
<script src="../js/auth-guard.js?v=account-widget-20260504"></script>
</head>
<body>

<div class="card">
  <h1>📦 Import SKU Shopee → Analytics</h1>
  <p class="sub">Upload 2 file Shopee (sales_info + media_info) để tự động parse và import SKU + ảnh vào hệ thống</p>

  <div class="api-row" style="margin-bottom:16px">
    <div>
      <label>🔗 API URL của bạn</label>
      <input type="url" id="apiUrl" value="https://huyvan-worker-api.nghiemchihuy.workers.dev" placeholder="https://your-worker.workers.dev">
    </div>
    <button class="btn btn-gray" onclick="testApi()">🔍 Test kết nối</button>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
    <div>
      <label>📄 File sales_info (*.xlsx)</label>
      <input type="file" id="salesFile" accept=".xlsx" onchange="onFileChange()">
    </div>
    <div>
      <label>🖼️ File media_info (*.xlsx)</label>
      <input type="file" id="mediaFile" accept=".xlsx" onchange="onFileChange()">
    </div>
  </div>

  <button class="btn btn-primary" id="parseBtn" onclick="parseFiles()" disabled>🔍 Phân tích file</button>
  <span id="parseLog" class="log"></span>
</div>

<div id="previewCard" class="card" style="display:none">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
    <div style="font-size:15px;font-weight:700;color:#1e293b">📋 Danh sách SKU (<span id="totalCount">0</span>)</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <select id="filterStatus" onchange="renderTable()">
        <option value="">Tất cả</option>
        <option value="wait">⏳ Chờ import</option>
        <option value="skip">⏭️ Bỏ qua (đã tồn tại)</option>
        <option value="ok">✅ Đã import</option>
        <option value="err">❌ Lỗi</option>
      </select>
      <input type="text" id="searchInput" placeholder="🔍 Tìm SKU..." oninput="renderTable()" style="width:180px">
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-val" id="s_total">0</div><div class="stat-label">Tổng SKU</div></div>
    <div class="stat"><div class="stat-val" id="s_wait" style="color:#d97706">0</div><div class="stat-label">Chờ import</div></div>
    <div class="stat"><div class="stat-val" id="s_skip" style="color:#64748b">0</div><div class="stat-label">Bỏ qua</div></div>
    <div class="stat"><div class="stat-val" id="s_ok" style="color:#10b981">0</div><div class="stat-label">Đã import</div></div>
    <div class="stat"><div class="stat-val" id="s_err" style="color:#ef4444">0</div><div class="stat-label">Lỗi</div></div>
  </div>

  <div class="actions">
    <button class="btn btn-primary" id="importBtn" onclick="startImport()">⬆️ Import tất cả vào Analytics</button>
    <button class="btn btn-gray" onclick="checkExisting()">🔄 Kiểm tra SKU đã tồn tại</button>
    <button class="btn btn-gray" onclick="selectAll(true)">☑️ Chọn tất cả</button>
    <button class="btn btn-gray" onclick="selectAll(false)">⬜ Bỏ chọn</button>
    <button class="btn btn-gray" onclick="downloadJson()">📥 Tải JSON</button>
  </div>

  <div id="progressWrap" style="display:none">
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="log" id="progressLog">Đang import...</div>
  </div>

  <div class="tbl-wrap">
    <table>
      <thead>
        <tr>
          <th class="chk-col"><input type="checkbox" id="chkAll" onchange="toggleAll(this.checked)"></th>
          <th>Ảnh</th>
          <th>SKU</th>
          <th>Tên sản phẩm</th>
          <th>Trạng thái</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="../js/features/import-sku-tool/import-sku-tool-inline-1.js?v=fe-split-20260514"></script>
</body>
</html>
