<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trạm Đóng Gói Thông Minh - OMS</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        /* Bố cục cố định, chống cuộn và co giãn lung tung trên thiết bị Apple */
        body { font-family: 'Segoe UI', sans-serif; background: #101010; color: white; text-align: center; margin: 0; padding: 10px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        h2 { color: #00CED1; margin: 5px 0; font-size: 20px; flex-shrink: 0; }
        
        /* Khung Camera: Ép nằm gọn gàng, không bị vỡ */
        #reader { width: 100%; max-width: 600px; margin: 0 auto; border-radius: 12px; overflow: hidden; border: 2px solid #333; background: #000; flex-shrink: 0; }
        #reader video { object-fit: cover; } /* Đảm bảo video không bị méo */
        
        /* Khung trạng thái: Nổi bật, nền đỏ sẫm khi đang quay */
        .status-box { margin: 10px auto; width: 100%; max-width: 600px; padding: 15px; background: #1a1a1a; border-radius: 10px; border: 2px solid #333; flex-shrink: 0; box-sizing: border-box; }
        .status-box.recording { border-color: #ff4757; background: #2a0a0a; box-shadow: 0 0 15px rgba(255, 71, 87, 0.4); }
        .order-id { font-size: 24px; color: #555; font-weight: bold; margin: 5px 0; word-wrap: break-word; }
        .order-id.active { color: #00FF88; font-size: 30px; }
        .record-indicator { display: none; color: #ff4757; font-weight: bold; font-size: 18px; margin-top: 5px; }
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
        
        /* Khung Log: Tự động co giãn chiếm phần trống còn lại */
.log-box { max-width: 600px; width: 100%; margin: 0 auto; text-align: left; font-size: 12px; color: #00FF88; background: #0A0A0A; padding: 10px; border-radius: 8px; flex-grow: 1; overflow-y: auto; box-sizing: border-box; }
        
        /* Lớp phủ mở khóa âm thanh Apple */
        #unlock-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.95); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .unlock-btn { background: #00FF88; color: #000; font-size: 20px; font-weight: bold; padding: 20px 40px; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 0 20px rgba(0, 255, 136, 0.5); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>
    <div id="unlock-overlay">
        <button class="unlock-btn" onclick="unlockAppleAudio()">🔓 CHẠM VÀO ĐÂY ĐỂ BẮT ĐẦU</button>
        <p style="color: #aaa; margin-top: 20px; text-align: center; font-size: 14px; padding: 0 20px;">* Apple iOS yêu cầu phải chạm vào màn hình 1 lần <br>để cho phép phát tiếng kêu "Tít".</p>
    </div>

    <h2>📡 TRẠM MẮT THẦN ĐÓNG GÓI</h2>
    
    <div id="reader" style="position: relative; height: 250px;">
        <video id="video-preview" style="width: 100%; height: 100%; object-fit: cover;" playsinline webkit-playsinline muted autoplay></video>
        <div style="position: absolute; top: 20%; left: 10%; width: 80%; height: 60%; border: 2px solid #00FF88; box-shadow: 0 0 0 4000px rgba(0,0,0,0.6); pointer-events: none; border-radius: 10px;"></div>
    </div>
    
    <div class="status-box" id="status-container">
        <div id="current-order" class="order-id">ĐANG DÒ TÌM PC...</div>
        <div class="record-indicator" id="record-status">🔴 <span class="blink">ĐANG GHI HÌNH...</span></div>
        <button id="btn-stop-packing" onclick="manualStop()" style="display: none; margin-top: 15px; padding: 12px; background: #ff4757; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 18px; cursor: pointer; width: 100%; box-shadow: 0 4px 15px rgba(255,71,87,0.3);">🛑 KẾT THÚC ĐÓNG GÓI</button>
    </div>
    <div class="log-box" id="dev-log">[*] Khởi động trạm...<br></div>

    <script>
        const API_BASE_URL = "https://huyvan-worker-api.nghiemchihuy.workers.dev/api";
        let PYTHON_SERVER_URL = null;
        let currentOrderId = null;
        let mediaRecorder = null;
        let recordedChunks = [];
let cameraStream = null;
        let audioCtx = null;

        // --- TRỊ BỆNH TẮT TIẾNG: HÀM MỞ KHÓA AUDIO APPLE ---
        function unlockAppleAudio() {
            // 1. Giấu lớp phủ NGAY LẬP TỨC để chắc chắn không bao giờ bị kẹt màn hình
            document.getElementById('unlock-overlay').style.display = 'none';
            
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (AudioContext) {
                    audioCtx = new AudioContext();
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    gain.gain.value = 0; 
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(0);
                    // Dùng thời gian tương đối tránh lỗi Safari
                    osc.stop(audioCtx.currentTime + 0.1);
                    devLog("✅ Đã sẵn sàng bộ cộng hưởng âm thanh!");
                }
            } catch (e) {
                devLog("⚠️ Bỏ qua âm thanh: Không hỗ trợ thiết bị này.");
            }
            
            // 2. Luôn luôn gọi khởi động hệ thống bất kể âm thanh có thành công hay không
            startSystem();
        }

        // --- CỖ MÁY TẠO ÂM THANH "TÍT" CHUYÊN NGHIỆP ---
        function playBeep() {
            if (!audioCtx) return;
            try {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = "square"; 
                osc.frequency.setValueAtTime(880, audioCtx.currentTime); 
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime); 
                osc.start();
                osc.stop(audioCtx.currentTime + 0.15); 
       } catch (err) { devLog("⚠️ Không phát được âm thanh"); }
        }

        // --- HÀM BẤM NÚT DỪNG KHẨN CẤP ---
        function manualStop() {
            playBeep();
            devLog("🛑 Bấm nút: Đã ra lệnh Dừng Đóng Gói!");
            
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop(); // Ép lưu nốt đoạn video hiện tại
            }
            
            currentOrderId = "STOP_PACKING";
            document.getElementById('current-order').innerText = "ĐÃ DỪNG GHI HÌNH";
            document.getElementById('status-container').className = "status-box";
            document.getElementById('record-status').style.display = "none";
            document.getElementById('btn-stop-packing').style.display = "none";
        }

        function devLog(msg) {
            const logBox = document.getElementById('dev-log');
            logBox.innerHTML += `[${new Date().toLocaleTimeString()}] ${msg}<br>`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        async function fetchServerCoordinates() {
            try {
                devLog("⏳ Đang lấy tọa độ từ Cloudflare...");
                const res = await fetch(`${API_BASE_URL}/cctv-config`);
                const data = await res.json();
                if (data.url) {
                    // Cắt bỏ dấu gạch chéo dư thừa ở cuối URL nếu có
                    const cleanUrl = data.url.replace(/\/$/, "");
                    PYTHON_SERVER_URL = `${cleanUrl}/upload-video`;
                    devLog(`✅ Đã thông hầm: ${cleanUrl}`);
                    document.getElementById('current-order').innerText = "SẴN SÀNG QUÉT MÃ";
                    initRecordingStream(); 
                } else {
                    devLog("❌ PC chưa báo cáo tọa độ!");
                }
            } catch (err) { devLog("❌ Lỗi kết nối Đám mây Cloudflare!"); }
        }

function initRecordingStream() {
            // [KIẾN TRÚC MỚI]: Bắt cóc luồng video của máy quét
            const videoEl = document.querySelector('video');
            if (videoEl && videoEl.srcObject) {
                try {
                    videoEl.setAttribute('playsinline', 'true');
                    videoEl.setAttribute('webkit-playsinline', 'true');
                    
                    cameraStream = videoEl.srcObject;
                    mediaRecorder = new MediaRecorder(cameraStream, { mimeType: 'video/webm; codecs=vp8', videoBitsPerSecond: 800000 });
                    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
                    
                    mediaRecorder.onstop = async () => {
                        // Lấy mác tên đơn hàng đã được gắn cố định lúc bấm máy (Không lấy currentOrderId vì nó có thể đã đổi)
                        const orderToUpload = mediaRecorder.customOrderId; 

                        if (recordedChunks.length > 0 && orderToUpload && orderToUpload !== "STOP_PACKING") {
                            const formData = new FormData();
                            formData.append('video', new Blob(recordedChunks, { type: 'video/webm' }), `${orderToUpload}.webm`);
                            formData.append('order_id', orderToUpload);
                            devLog(`📦 Đang bắn video đơn ${orderToUpload} về PC...`);
                            
                            // [BỌC THÉP] Ép Safari phải báo cáo kết quả hạ cánh rõ ràng
                            fetch(PYTHON_SERVER_URL, { method: 'POST', body: formData })
                            .then(async res => {
                                if (res.ok) {
                                    devLog(`✅ [${orderToUpload}] Đã chui lọt vào PC thành công!`);
                                } else {
                                    devLog(`❌ [${orderToUpload}] PC TỪ CHỐI (Mã lỗi: ${res.status})`);
                                }
                            })
                            .catch(err => devLog(`❌ [${orderToUpload}] Đứt cáp mạng: ${err.message}`));
                        }
                        // LUÔN LUÔN dọn dẹp RAM sau khi lưu xong, bất kể là lỗi hay thành công
                        recordedChunks = [];
                    };
                    devLog("✅ Đã móc nối thành công Camera vào Động cơ Ghi hình!");
                } catch (err) {
                    devLog("❌ Lỗi tạo luồng ghi: " + err.message);
                }
            } else {
                devLog("⏳ Đang đợi Camera khởi động để móc nối...");
                setTimeout(initRecordingStream, 1500); 
            }
        }

        function onScanSuccess(decodedText) {
            if (decodedText === currentOrderId) return;
            
            playBeep();
            devLog(`⚡ Bắt được mã: ${decodedText}`);

            // 1. DỪNG CAMERA: Ép lưu video của đơn hàng CŨ ngay lập tức
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop(); 
            }
            
            // 2. Cập nhật giao diện sang mã MỚI
            currentOrderId = decodedText;
            document.getElementById('current-order').innerText = currentOrderId;
            
// 3. NẾU LÀ LỆNH DỪNG ĐÓNG GÓI -> Tắt giao diện quay và nghỉ
            if (decodedText === "STOP_PACKING") {
                document.getElementById('status-container').className = "status-box";
                document.getElementById('record-status').style.display = "none";
                document.getElementById('btn-stop-packing').style.display = "none"; // Ẩn nút
                return;
            }
            
            // 4. NẾU LÀ ĐƠN MỚI -> Đợi 500ms cho băng hình cũ lưu xong rồi bấm máy quay đơn mới
            setTimeout(() => {
                if (mediaRecorder && mediaRecorder.state === "inactive") {
                    mediaRecorder.customOrderId = currentOrderId; 
                    mediaRecorder.start();
                    document.getElementById('status-container').className = "status-box recording";
                    document.getElementById('record-status').style.display = "block";
                    document.getElementById('btn-stop-packing').style.display = "block"; // Hiện nút
                }
            }, 500);
        }

    let codeReader;
        
        function startSystem() {
            devLog("🚀 Bắt đầu nổ máy với Động cơ lõi ZXing...");
            codeReader = new ZXing.BrowserMultiFormatReader();
            
            // Ép iPad dùng Camera sau và đẩy lên độ phân giải HD để đọc mã vạch siêu nhạy
            const constraints = { 
                video: { facingMode: "environment", width: { ideal: 1280 } } 
            };

            // Bắn luồng camera vào thẻ video và bắt đầu soi mã liên tục
            codeReader.decodeFromConstraints(constraints, 'video-preview', (result, err) => {
                if (result) {
                    onScanSuccess(result.getText());
                }
            });
            
            fetchServerCoordinates();
        }
        // (Lưu ý: Không tự chạy code nữa. Đợi Kỹ sư trưởng bấm nút "MỞ KHÓA" thì startSystem mới được gọi)
    </script>
</body>
</html>
