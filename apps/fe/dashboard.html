<h1>Profit Dashboard</h1>

<div id="stats"></div>

<canvas id="chart"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

async function load(){

 const stats=await fetch("/api/dashboard").then(r=>r.json())

 document.getElementById("stats").innerHTML=
 `Revenue: ${stats.revenue}
 Profit: ${stats.profit}
 Orders: ${stats.orders}`

 const rows=await fetch("/api/profit-by-day").then(r=>r.json())

 new Chart(document.getElementById("chart"),{
  type:"line",
  data:{
   labels:rows.map(r=>r.d),
   datasets:[{
    label:"Profit",
    data:rows.map(r=>r.profit)
   }]
  }
 })

}

load()

</script>
