<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Upload BГЎo CГЎo SГ n</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js"
</script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, sans-serif; background: #f0f2f5; }

.topbar {
  background: #1a1a2e; color: white;
  padding: 14px 28px; display: flex; align-items: center; gap: 16px;
}
.topbar a { color: #aaa; text-decoration: none; font-size: 14px; }
.topbar a:hover { color: white; }

.container { max-width: 900px; margin: 32px auto; padding: 0 20px; }

.card {
  background: white; border-radius: 12px;
  padding: 24px; margin-bottom: 24px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.card-title {
  font-size: 15px; font-weight: 700;
  margin-bottom: 18px; padding-bottom: 10px;
  border-bottom: 2px solid #f0f2f5;
}

.upload-zone {
  border: 2px dashed #d1d5db; border-radius: 10px;
  padding: 32px; text-align: center; cursor: pointer;
  transition: all 0.2s; margin-bottom: 16px;
}
.upload-zone:hover, .upload-zone.drag { border-color: #4f46e5; background: #f5f3ff; }
.upload-zone input { display: none; }

.grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 16px; }
.field { display: flex; flex-direction: column; gap: 4px; }
.field label { font-size: 13px; color: #555; font-weight: 500; }
.field select, .field input {
  border: 1.5px solid #e0e0e0; border-radius: 8px;
  padding: 9px 12px; font-size: 14px; outline: none;
}
.field select:focus, .field input:focus { border-color: #4f46e5; }

.btn {
  padding: 10px 24px; border: none; border-radius: 8px;
  font-size: 14px; font-weight: 600; cursor: pointer;
}
.btn-primary { background: #4f46e5; color: white; }
.btn-primary:hover { background: #4338ca; }
.btn-primary:disabled { background: #a5b4fc; cursor: not-allowed; }

/* File list */
.file-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 14px; background: #f9fafb;
  border-radius: 8px; margin-bottom: 8px;
}
.file-icon { font-size: 20px; }
.file-info { flex: 1; }
.file-name { font-size: 13px; font-weight: 600; }
.file-meta { font-size: 12px; color: #888; }
.file-remove { color: #ef4444; cursor: pointer; font-size: 18px; border: none; background: none; }

/* Upload history */
.history-item {
  display: grid;
  grid-template-columns: 80px 100px 1fr auto auto;
  gap: 12px; align-items: center;
  padding: 10px 14px; border-bottom: 1px solid #f0f0f0;
  font-size: 13px;
}
.history-item:last-child { border-bottom: none; }

.platform-tag {
  display: inline-block; padding: 2px 8px;
  border-radius: 12px; font-size: 11px; font-weight: 700; color: white;
}
.tag-shopee { background: #ee4d2d; }
.tag-tiktok { background: #010101; }
.tag-lazada { background: #0f146d; }

.status-ok  { color: #16a34a; font-weight: 600; }
.status-err { color: #dc2626; }

.log {
  margin-top: 16px; padding: 14px; background: #f9fafb;
  border-radius: 8px; font-size: 13px; line-height: 1.8;
  display: none;
}
.log.show { display: block; }
</style>
</head>
<body>

<div class="topbar">
  <a href="profit-dashboard.html">вҶҗ Dashboard</a>
  <span>рҹ“Ғ Upload BГЎo CГЎo SГ n</span>
</div>

<div class="container">

  <!-- Upload form -->
  <div class="card">
    <div class="card-title">рҹ“Ө Upload BГЎo CГЎo Mб»ӣi</div>

    <div class="grid3">
      <div class="field">
        <label>SГ n</label>
        <select id="selPlatform">
          <option value="shopee">Shopee</option>
          <option value="tiktok">TikTok</option>
          <option value="lazada">Lazada</option>
        </select>
      </div>
      <div class="field">
        <label>LoбәЎi bГЎo cГЎo</label>
        <select id="selType">
          <option value="income">Doanh Thu</option>
          <option value="expense">Chi PhГӯ</option>
          <option value="orders">ДҗЖЎn HГ ng</option>
        </select>
      </div>
      <div class="field">
        <label>Shop</label>
        <div style="display:flex;gap:6px">
          <input type="text" id="inpShop" placeholder="VD: KHOGIADUNGHUYVAN"
            style="flex:1;border:1.5px solid #e0e0e0;border-radius:8px;padding:9px 12px;font-size:14px;outline:none"
            list="shopList">
          <datalist id="shopList"></datalist>
          <button onclick="saveShop()" title="LЖ°u tГӘn shop"
            style="background:#10b981;color:white;border:none;border-radius:8px;padding:9px 12px;cursor:pointer;font-size:16px">рҹ’ҫ</button>
        </div>
      </div>
    </div>

    <div class="upload-zone" id="dropzone" onclick="document.getElementById('fileInput').click()">
      <input type="file" id="fileInput" accept=".pdf,.xlsx,.csv" multiple>
      <div style="font-size:32px;margin-bottom:8px">рҹ“„</div>
      <div style="font-weight:600;margin-bottom:4px">KГ©o thбәЈ hoбә·c nhбәҘn Д‘б»ғ chб»Қn file</div>
      <div style="font-size:12px;color:#888">Hб»— trб»Ј: PDF (Shopee, Lazada), Excel/CSV (TikTok)</div>
    </div>

    <div id="fileList"></div>

    <button class="btn btn-primary" id="btnUpload" onclick="uploadAll()" style="margin-top:12px">
      в¬ҶпёҸ Upload & Parse
    </button>

    <div class="log" id="uploadLog"></div>
  </div>

  <!-- Lб»Ӣch sб»ӯ upload -->
  <div class="card">
<div class="card-title" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
      <span>рҹ“Ӣ BГЎo CГЎo ДҗГЈ Upload</span>
      <div style="display:flex;gap:8px">
        <select id="filterPlatform" onchange="loadHistory()" style="border:1.5px solid #e0e0e0;border-radius:7px;padding:6px 10px;font-size:13px;outline:none">
          <option value="">TбәҘt cбәЈ sГ n</option>
          <option value="shopee">Shopee</option>
          <option value="tiktok">TikTok</option>
          <option value="lazada">Lazada</option>
        </select>
        <select id="filterMonth" onchange="loadHistory()" style="border:1.5px solid #e0e0e0;border-radius:7px;padding:6px 10px;font-size:13px;outline:none">
          <option value="">TбәҘt cбәЈ thГЎng</option>
        </select>
      </div>
    </div>

    <div id="historyList">
      <div style="text-align:center;color:#aaa;padding:30px">Дҗang tбәЈi...</div>
    </div>
  </div>

</div>

<script>
const API = "https://huyvan-worker-api.nghiemchihuy.workers.dev"
let selectedFiles = []

// в”Җв”Җ QuбәЈn lГҪ danh sГЎch Shop (lЖ°u localStorage) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function loadShops() {
  return JSON.parse(localStorage.getItem("report_shops") || "[]")
}

function saveShop() {
  const val = document.getElementById("inpShop").value.trim()
  if (!val) return
  const shops = loadShops()
  if (!shops.includes(val)) {
    shops.push(val)
    localStorage.setItem("report_shops", JSON.stringify(shops))
    renderShopList()
    showToast("вң… ДҗГЈ lЖ°u shop: " + val)
  }
}

function renderShopList() {
  const shops = loadShops()
  document.getElementById("shopList").innerHTML =
    shops.map(s => `<option value="${s}">`).join("")
}

function showToast(msg) {
  const t = document.createElement("div")
  t.style.cssText = "position:fixed;bottom:24px;right:24px;background:#1a1a2e;color:white;padding:12px 20px;border-radius:8px;font-size:14px;z-index:999"
  t.textContent = msg
  document.body.appendChild(t)
  setTimeout(() => t.remove(), 2500)
}

renderShopList()

// в”Җв”Җ Drag & Drop в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const dropzone = document.getElementById("dropzone")
const fileInput = document.getElementById("fileInput")

dropzone.addEventListener("dragover", e => { e.preventDefault(); dropzone.classList.add("drag") })
dropzone.addEventListener("dragleave", () => dropzone.classList.remove("drag"))
dropzone.addEventListener("drop", e => {
  e.preventDefault()
  dropzone.classList.remove("drag")
  addFiles([...e.dataTransfer.files])
})
fileInput.addEventListener("change", () => addFiles([...fileInput.files]))

function addFiles(files) {
  files.forEach(f => {
    if (!selectedFiles.find(x => x.name === f.name)) selectedFiles.push(f)
  })
  renderFileList()
}

function removeFile(name) {
  selectedFiles = selectedFiles.filter(f => f.name !== name)
  renderFileList()
}

function renderFileList() {
  const el = document.getElementById("fileList")
  if (!selectedFiles.length) { el.innerHTML = ""; return }

  el.innerHTML = selectedFiles.map(f => `
    <div class="file-item">
      <span class="file-icon">${f.name.endsWith(".pdf") ? "рҹ“„" : "рҹ“Ҡ"}</span>
      <div class="file-info">
        <div class="file-name">${f.name}</div>
        <div class="file-meta">${(f.size / 1024).toFixed(1)} KB</div>
      </div>
      <button class="file-remove" onclick="removeFile('${f.name}')">вң•</button>
    </div>
  `).join("")
}

// в”Җв”Җ Upload в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
async function uploadAll() {
  if (!selectedFiles.length) { alert("Chб»Қn file trЖ°б»ӣc!"); return }

  const btn = document.getElementById("btnUpload")
  const log = document.getElementById("uploadLog")
  btn.disabled = true
  log.classList.add("show")
  log.innerHTML = ""

  const platform = document.getElementById("selPlatform").value
  const type     = document.getElementById("selType").value
  const shop     = document.getElementById("inpShop").value.trim()

  for (const file of selectedFiles) {
    log.innerHTML += `вҸі Дҗang Д‘б»Қc <b>${file.name}</b>...<br>`

    try {
      let result
      let newName

      // TikTok Excel: parse б»ҹ client trЖ°б»ӣc
      if (platform === "tiktok" && (file.name.endsWith(".xlsx") || file.name.endsWith(".csv"))) {
        const tiktokData = await parseTiktokExcelClient(file)
        // TГӘn Excel: lбәҘy thГЎng tб»« sheet Reports
        const month      = tiktokData._month || detectMonthFromName(file.name)
        const cleanShop  = (shop || "SHOP").replace(/\s+/g, "-").toUpperCase()
        newName = `TIKTOK_${cleanShop}_${month}_doanh-thu.xlsx`
        log.innerHTML += `рҹ“қ Дҗб»•i tГӘn вҶ’ <b>${newName}</b><br>`
        result = await uploadTiktokJson(new File([file], newName, { type: file.type }), tiktokData, platform, shop, type)
      } else {
        // PDF: extract text вҶ’ smart rename вҶ’ parse
        const pdfText    = await extractPdfTextClient(file)
        newName          = smartRename(pdfText, file.name, platform, shop, type)
        const parsedData = autoDetectClient(pdfText, platform)

        log.innerHTML += `рҹ“қ Дҗб»•i tГӘn вҶ’ <b>${newName}</b><br>`

        const formData    = new FormData()
        const renamedFile = new File([file], newName, { type: file.type })
        formData.append("file", renamedFile)
        formData.append("platform", platform)
        formData.append("shop", shop)
        formData.append("report_type", type)
        formData.append("parsed_json", JSON.stringify(parsedData))

        const res = await fetch(API + "/api/upload-report", { method: "POST", body: formData })
        result = await res.json()
      }

      if (result.status === "ok") {
        log.innerHTML += `вң… <b>${file.name}</b> вҶ’ ${result.r2_key}<br>`
        log.innerHTML += renderParsed(result.parsed)
      } else {
        log.innerHTML += `вқҢ Lб»—i: ${result.error || "Unknown"}<br>`
      }
    } catch(e) {
      log.innerHTML += `вқҢ ${file.name}: ${e.message}<br>`
    }
  }

  selectedFiles = []
  renderFileList()
  btn.disabled = false
  loadHistory()
}

// в”Җв”Җ Дҗбә·t tГӘn file thГҙng minh dб»ұa vГ o nб»ҷi dung PDF в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function smartRename(pdfText, filename, platform, shop, type) {
  const ext       = filename.split(".").pop().toLowerCase()
  const cleanShop = (shop || "SHOP").replace(/\s+/g, "-").toUpperCase()

  // в”Җв”Җ Detect thГЎng tб»« Nб»ҳI DUNG PDF в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  let month = ""

  // Shopee: "thГЎng 02 nДғm (year) 2026" hoбә·c "02/2026"
  const mShopee = pdfText.match(/(\d{2})\/(\d{4})_/) || pdfText.match(/thГЎng\s+(\d{2}).*?n[aДғ]m.*?(\d{4})/i)
  if (mShopee) month = `${mShopee[2]}-${mShopee[1]}`

  // TikTok Tax Invoice: "Period : Jan 1, 2026 - Jan 31, 2026"
  if (!month) {
    const mTikPeriod = pdfText.match(/Period\s*:\s*(\w+)\s+\d+,\s*(\d{4})/)
    if (mTikPeriod) {
      const months = {Jan:"01",Feb:"02",Mar:"03",Apr:"04",May:"05",Jun:"06",
                      Jul:"07",Aug:"08",Sep:"09",Oct:"10",Nov:"11",Dec:"12"}
      month = `${mTikPeriod[2]}-${months[mTikPeriod[1]] || "01"}`
    }
  }

  // Lazada: "thГЎng 02/2026 (02/02/2026 - 08/02/2026)"
  if (!month) {
    const mLaz = pdfText.match(/thГЎng\s+(\d{2})\/(\d{4})/)
    if (mLaz) month = `${mLaz[2]}-${mLaz[1]}`
  }

  // Fallback tб»« tГӘn file
  if (!month) month = detectMonthFromName(filename)

  // в”Җв”Җ Detect loбәЎi phГӯ tб»« Nб»ҳI DUNG в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  let feeType = type  // default: income / expense / orders

  if (type === "expense" || type === "income") {
    // Shopee hГіa Д‘ЖЎn chi phГӯ
    if (pdfText.includes("PhГӯ hoa hб»“ng cб»‘ Д‘б»Ӣnh") && pdfText.includes("PiShip")) {
      feeType = "phi-san"  // PhГӯ sГ n tб»•ng hб»Јp
    } else if (pdfText.includes("Д‘бәҘu thбә§u tб»« khГіa") || pdfText.includes("Paid Ads")) {
      feeType = "phi-dau-thau"
    } else if (pdfText.includes("PhГӯ rГәt tiб»Ғn") || pdfText.includes("Withdrawal Fee")) {
      feeType = "phi-rut-tien"
    }
    // TikTok hГіa Д‘ЖЎn
    else if (pdfText.includes("Tokgistic") || pdfText.includes("Domestic delivery shipping fee")) {
      feeType = "phi-van-chuyen"
    } else if (pdfText.includes("TIKTOK PTE") || pdfText.includes("VNEC")) {
      feeType = "phi-san"
    }
    // Lazada hГіa Д‘ЖЎn (RECESS) вҖ” theo tuбә§n
    else if (pdfText.includes("RECESS") || pdfText.includes("VN33W4TIY8")) {
      // LбәҘy khoбәЈng thб»қi gian VD: "02/02/2026 - 08/02/2026" вҶ’ tuan1
      const mWeek = pdfText.match(/\((\d{2})\/(\d{2})\/\d{4}\s*-\s*(\d{2})\/(\d{2})\/\d{4}\)/)
      if (mWeek) {
        const startDay = parseInt(mWeek[1])
        const weekNum  = startDay <= 7 ? "tuan1" : startDay <= 14 ? "tuan2"
                       : startDay <= 21 ? "tuan3" : "tuan4"
        feeType = `phi-san-${weekNum}`
      } else {
        feeType = "phi-san"
      }
    }
    // BГЎo cГЎo doanh thu Shopee (quyбәҝt toГЎn)
    else if (pdfText.includes("Tб»•ng thanh toГЎn Д‘ГЈ chuyб»ғn") || pdfText.includes("GiГЎ sбәЈn phбә©m")) {
      feeType = "doanh-thu"
    }
    // BГЎo cГЎo doanh thu Lazada
    else if (pdfText.includes("GiГЎ trб»Ӣ sбәЈn phбә©m") && pdfText.includes("Tб»•ng thanh toГЎn")) {
      feeType = "doanh-thu"
    }
  }

  return `${platform.toUpperCase()}_${cleanShop}_${month}_${feeType}.${ext}`
}

// Detect thГЎng tб»« tГӘn file
function detectMonthFromName(filename) {
  const m1 = filename.match(/(\d{4})-(\d{2})/)
  if (m1) return `${m1[1]}-${m1[2]}`
  const m2 = filename.match(/(\d{4})(\d{2})\d{2}/)
  if (m2) return `${m2[1]}-${m2[2]}`
  const m3 = filename.match(/(\d{4})_(\d{2})/)
  if (m3) return `${m3[1]}-${m3[2]}`
  // TikTok: income_20260308... вҶ’ 2026-02 (thГЎng cб»§a kб»і bГЎo cГЎo, lГ№i 1 thГЎng)
  const m4 = filename.match(/(\d{4})(\d{2})(\d{2})/)
  if (m4) {
    let y = parseInt(m4[1]), mo = parseInt(m4[2]) - 1
    if (mo < 1) { mo = 12; y-- }
    return `${y}-${String(mo).padStart(2,"0")}`
  }
  const now = new Date()
  return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`
}

function autoDetectClient(text, platform) {
  // HГіa Д‘ЖЎn chi phГӯ Shopee
  if (text.includes("CГ”NG TY TNHH SHOPEE") || text.includes("1K26TAC")) {
    return parseShopeeExpenseClient(text)
  }
  // HГіa Д‘ЖЎn chi phГӯ TikTok
  if (text.includes("TIKTOK PTE") || text.includes("Tokgistic") || text.includes("VNEC")) {
    return parseTiktokExpenseClient(text)
  }
  // HГіa Д‘ЖЎn chi phГӯ Lazada (RECESS)
  if (text.includes("RECESS") || text.includes("VN33W4TIY8")) {
    return parseLazadaExpenseClient(text)
  }
  // BГЎo cГЎo doanh thu bГ¬nh thЖ°б»қng
  if (platform === "shopee") return parseShopeeClient(text)
  if (platform === "lazada") return parseLazadaClient(text)
  return {}
}

function parseShopeeExpenseClient(text) {
  const findAmt = (label) => {
    const re = new RegExp(label + "[\\s\\S]{0,100}?([\\d]{1,3}(?:\\.[\\d]{3})+)")
    const m = text.match(re)
    return m ? parseInt(m[1].replace(/\./g,"")) : 0
  }
  const subMatch   = text.match(/Cб»ҷng tiб»Ғn hГ ng[^:]*[:\s]+([\d\.]+)/)
  const vatMatch   = text.match(/Tiб»Ғn thuбәҝ GTGT[^:]*[:\s]+([\d\.]+)/)
  const totalMatch = text.match(/Tб»•ng cб»ҷng tiб»Ғn thanh toГЎn[^:]*[:\s]+([\d\.]+)/)

  const sub   = subMatch   ? parseInt(subMatch[1].replace(/\./g,""))   : 0
  const vat   = vatMatch   ? parseInt(vatMatch[1].replace(/\./g,""))   : 0
  const total = totalMatch ? parseInt(totalMatch[1].replace(/\./g,"")) : 0

  return {
    gross_revenue: 0, refund_amount: 0, net_product_revenue: 0,
    platform_subsidy: 0, seller_voucher: 0, co_funded_voucher: 0, shipping_net: 0,

function parseTiktokExpenseClient(text) {
  const parseVND = (s) => {
    if (!s) return 0
    // Sб»‘ dбәЎng 7.787.451 hoбә·c 7,787,451
    return parseInt(s.replace(/[,\.]/g,"")) || 0
  }
  const findRow = (label) => {
    const re = new RegExp(label + "[^\\d]*([\\.\\d,]+)[^\\d]*([\\.\\d,]+)[^\\d]*([\\.\\d,]+)")
    const m = text.match(re)
    return m ? parseVND(m[1]) : 0
  }
  const subM   = text.match(/Subtotal \(excluding Tax\)[^\d]*([\d\.,]+\d)/)
  const taxM   = text.match(/Total Tax[^\d]*([\d\.,]+\d)/)
  const totalM = text.match(/Total Amount[^\d]*([\d\.,]+\d)/)

  const sub   = subM   ? parseVND(subM[1])   : 0
  const tax   = taxM   ? parseVND(taxM[1])   : 0
  const total = totalM ? parseVND(totalM[1]) : 0

  const isLogistics = text.includes("Tokgistic") || text.includes("delivery shipping fee")

  return {
    gross_revenue: 0, refund_amount: 0, net_product_revenue: 0,
    platform_subsidy: 0, seller_voucher: 0, co_funded_voucher: 0,
    shipping_net: isLogistics ? -sub : 0,
    fee_commission:  isLogistics ? 0 : findRow("TikTok Shop commission fee"),
    fee_payment:     isLogistics ? 0 : findRow("Transaction fee"),
    fee_service:     isLogistics ? 0 : findRow("SFR service fee"),
    fee_affiliate:   0,
    fee_piship_sfr:  isLogistics ? 0 : findRow("SFR service fee"),
    fee_handling:    isLogistics ? 0 : findRow("Order Processing Fee"),
    fee_total: sub, compensation: 0,
    tax_vat: tax, tax_pit: 0, tax_total: tax,
    total_payout: -total,
  }
}

async function extractPdfTextClient(file) {
  const buf      = await file.arrayBuffer()
  const pdf      = await pdfjsLib.getDocument({ data: buf }).promise
  const texts    = []
  for (let i = 1; i <= pdf.numPages; i++) {
    const page    = await pdf.getPage(i)
    const content = await page.getTextContent()
    texts.push(content.items.map(t => t.str).join(" "))
  }
  return texts.join("\n")
}

// Parse bГЎo cГЎo Shopee tб»« text
function parseShopeeClient(text) {
  const findNum = (label) => {
    // TГ¬m sб»‘ gбә§n nhбәҘt sau label (cГі thб»ғ cГі dбәҘu phбә©y, chбәҘm)
    const re = new RegExp(label.replace(/[()]/g, "\\$&") + "[\\s\\S]{0,80}?([\\d,]+)")
    const m  = text.match(re)
    if (!m) return 0
    return parseInt(m[1].replace(/[,.]/g, "")) || 0
  }

  const gross_revenue    = findNum("GiГЎ sбәЈn phбә©m")
  const refund_amount    = findNum("Sб»‘ tiб»Ғn hoГ n lбәЎi")
  const platform_subsidy = findNum("SбәЈn phбә©m Д‘Ж°б»Јc trб»Ј giГЎ tб»« Shopee")
  const co_funded_voucher= findNum("MГЈ Ж°u Д‘ГЈi Дҗб»“ng TГ i Trб»Ј do NgЖ°б»қi BГЎn chб»Ӣu")
  const fee_commission   = findNum("PhГӯ cб»‘ Д‘б»Ӣnh")
  const fee_service      = findNum("PhГӯ Dб»Ӣch Vб»Ҙ")
  const fee_payment      = findNum("PhГӯ thanh toГЎn")
  const fee_affiliate    = findNum("PhГӯ hoa hб»“ng Tiбәҝp thб»Ӣ liГӘn kбәҝt")
  const fee_piship_sfr   = findNum("PhГӯ dб»Ӣch vб»Ҙ PiShip")
  const fee_total        = fee_commission + fee_service + fee_payment + fee_affiliate + fee_piship_sfr
  const tax_vat          = findNum("Thuбәҝ GTGT")
  const tax_pit          = findNum("Thuбәҝ TNCN")
  const tax_total        = tax_vat + tax_pit
  const total_payout     = findNum("Tб»•ng thanh toГЎn Д‘ГЈ chuyб»ғn")
  const net_product_revenue = gross_revenue - refund_amount + platform_subsidy - co_funded_voucher

  return {
    gross_revenue, refund_amount, net_product_revenue,
    platform_subsidy, seller_voucher: 0, co_funded_voucher,
    shipping_net: 0,
    fee_commission, fee_payment, fee_service,
    fee_affiliate, fee_piship_sfr, fee_handling: 0, fee_total,
    compensation: 0,
    tax_vat, tax_pit, tax_total,
    total_payout,
  }
}

// Parse TikTok Excel б»ҹ client
async function parseTiktokExcelClient(file) {
  const buf  = await file.arrayBuffer()
  const wb   = XLSX.read(buf)
  const ws   = wb.Sheets["Reports"] || wb.Sheets[wb.SheetNames[0]]
  const rows = XLSX.utils.sheet_to_json(ws, { header: 1 })

  // LбәҘy value б»ҹ cб»ҷt F (index 5), abs nбәҝu cбә§n
  const n    = (val) => parseFloat(String(val || "0").replace(/[^0-9.-]/g, "")) || 0
  const abs  = (val) => Math.abs(n(val))

  // TГ¬m exact label б»ҹ cб»ҷt B/C/D/E, value б»ҹ cб»ҷt F
  const findExact = (keyword) => {
    for (const r of rows) {
      for (let c = 1; c <= 4; c++) {
        if (String(r[c] || "").trim() === keyword) return n(r[5])
      }
    }
    return 0
  }

  // Дҗб»Қc tб»«ng dГІng theo Д‘Гәng label
  const total_settlement   = findExact("Total settlement amount")
  const total_revenue      = findExact("Total Revenue")
  const subtotal_after     = findExact("Subtotal after seller discounts")
  const refund_subtotal    = abs(findExact("Refund subtotal after seller discounts"))
  const transaction_fee    = abs(findExact("Transaction fee"))
  const commission_fee     = abs(findExact("TikTok Shop commission fee"))
  const seller_shipping    = abs(findExact("Seller shipping fee"))
  const affiliate_fee      = abs(findExact("Affiliate Commission"))
  const sfr_service_fee    = abs(findExact("SFR service fee"))
  const order_handling_fee = abs(findExact("Order processing fee"))
  const tax_vat            = abs(findExact("VAT withheld by TikTok Shop"))
  const tax_pit            = abs(findExact("PIT withheld by TikTok Shop"))
  const total_adjustments  = n(findExact("Total adjustments"))

  const fee_total = transaction_fee + commission_fee + seller_shipping
                  + affiliate_fee + sfr_service_fee + order_handling_fee
  const tax_total = tax_vat + tax_pit
  
     // LбәҘy thГЎng tб»« "Time period: 2026/02/01-2026/02/28"
     let _month = ""
     for (const r of rows) {
       const label = String(r[1] || "").trim()
       if (label === "Time period:") {
         const mp = String(r[5] || "").match(/(\d{4})\/(\d{2})/)
         if (mp) _month = `${mp[1]}-${mp[2]}`
         break
       }
     }
   
return {
    _month,
    gross_revenue:       total_revenue,
    refund_amount:       refund_subtotal,
    net_product_revenue: subtotal_after - refund_subtotal,
    platform_subsidy:    0,
    seller_voucher:      0,
    co_funded_voucher:   0,
    shipping_net:        -seller_shipping,
    fee_commission:      commission_fee,
    fee_payment:         transaction_fee,
    fee_service:         sfr_service_fee,
    fee_affiliate:       affiliate_fee,
    fee_piship_sfr:      sfr_service_fee,
    fee_handling:        order_handling_fee,
    fee_total,
    compensation:        Math.max(0, total_adjustments),
    tax_vat,
    tax_pit,
    tax_total,
    total_payout:        total_settlement,
  }
}

async function uploadTiktokJson(file, tiktokData, platform, shop, type) {

  formData.append("shop", shop)

  const sel    = document.getElementById("filterMonth")

async function deleteReport(id, r2Key) {
  if (!confirm("XГіa bГЎo cГЎo nГ y?")) return
  try {
    const res = await fetch(API + "/api/reports/" + id, {
      method: "DELETE",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ r2_key: r2Key })
    })
    const data = await res.json()
    if (data.status === "ok") loadHistory()
    else alert("Lб»—i xГіa: " + (data.error || "unknown"))
  } catch(e) {
    alert("Lб»—i: " + e.message)
  }
}
