<!DOCTYPE html>
<html>

<head>
<title>Profit Analysis</title>
</head>

<body>

<h1>Upload Order CSV</h1>

<input type="file" id="file">

<button onclick="analyze()">Analyze</button>

<pre id="output"></pre>

<script type="module">

import {parseCSV,normalizeOrder} from "./js/parser.js"
import {calculateProfit} from "./js/profit-engine.js"

async function analyze(){

 const file = document.getElementById("file").files[0]

 const text = await file.text()

 const rows = parseCSV(text)

 let results = []

 rows.forEach(r=>{

  const order = normalizeOrder(r)

  if(!order) return

  const product = {
   cost: 10000
  }

  const profit = calculateProfit(order,product)

  results.push({
   ...order,
   ...profit
  })

 })

 document.getElementById("output").innerText =
 JSON.stringify(results,null,2)

}

window.analyze = analyze

</script>

</body>
</html>
